
# Application name
spring.application.name=backend-controle-financeiro

# Server port
server.port=8080

# MongoDB Atlas Configuration
spring.data.mongodb.uri=mongodb+srv://financeiro_admin:SuaSenhaForte123!@cluster0.xxxxx.mongodb.net/financeiro_familiar?retryWrites=true&w=majority
spring.data.mongodb.database=financeiro_familiar

# Connection pool settings
spring.data.mongodb.connection-pool.max-size=10
spring.data.mongodb.connection-pool.min-size=5
spring.data.mongodb.connection-pool.max-wait-time=120000
spring.data.mongodb.connection-pool.max-connection-life-time=0

# Logging
logging.level.org.springframework.data.mongodb=INFO
logging.level.com.financeiro=DEBUG
logging.level.org.mongodb.driver=INFO

# Jackson date format
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=America/Sao_Paulo

# Actuator (opcional)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
