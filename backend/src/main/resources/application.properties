# Application name
spring.application.name=backend-controle-financeiro

# Server port
server.port=8080

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/financeiro_familiar
spring.datasource.username=financeiro
spring.datasource.password=financeiro123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Logging
logging.level.com.financeiro=DEBUG
logging.level.org.hibernate.SQL=WARN

# Jackson date format
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=America/Sao_Paulo

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
