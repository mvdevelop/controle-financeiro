version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-financeiro
    environment:
      POSTGRES_DB: financeiro_familiar
      POSTGRES_USER: financeiro
      POSTGRES_PASSWORD: financeiro123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financeiro -d financeiro_familiar"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
